<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <title>Bingo em Casa</title>
  <style>
    :root {
      --bg: #07111f;
      --bg-2: #0f1b2f;
      --panel: rgba(255, 255, 255, .09);
      --panel-2: rgba(255, 255, 255, .14);
      --line: rgba(255, 255, 255, .14);
      --text: #f8fafc;
      --muted: #b7c4d8;
      --accent: #22c55e;
      --accent-ink: #052e16;
      --blue: #38bdf8;
      --shadow: 0 20px 50px rgba(0, 0, 0, .32);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% -10%, #203b66 0, rgba(32, 59, 102, .42) 32%, transparent 63%),
        linear-gradient(180deg, var(--bg-2), var(--bg));
      display: grid;
      place-items: center;
      padding: max(20px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
    }
    main { width: min(100%, 680px); display: grid; gap: 22px; text-align: center; }
    h1 { margin: 0; font-size: clamp(2.1rem, 10vw, 4.4rem); line-height: .92; letter-spacing: -.07em; font-weight: 950; }
    .subtitle { margin: 9px 0 0; color: var(--muted); font-size: clamp(.98rem, 3.6vw, 1.2rem); font-weight: 750; }
    .choices { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .choice {
      min-height: 212px;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 22px;
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      box-shadow: var(--shadow);
      display: grid;
      align-content: space-between;
      gap: 22px;
      text-align: left;
      position: relative;
      overflow: hidden;
      transition: transform .12s ease, border-color .16s ease, background .16s ease;
    }
    .choice::after { content: ""; position: absolute; right: -42px; bottom: -54px; width: 154px; height: 154px; border-radius: 50%; background: rgba(255,255,255,.08); pointer-events: none; }
    .choice:active { transform: scale(.99); }
    .choice:hover { border-color: rgba(255,255,255,.32); background: linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.10)); }
    .icon { width: 58px; height: 58px; border-radius: 19px; display: grid; place-items: center; font-size: 2rem; background: rgba(255,255,255,.12); border: 1px solid var(--line); }
    .choice strong { display: block; font-size: clamp(1.35rem, 5.4vw, 2rem); line-height: 1; letter-spacing: -.045em; font-weight: 950; }
    .choice span { display: block; margin-top: 8px; color: var(--muted); font-weight: 750; line-height: 1.3; }
    .choice.primary .icon { background: var(--accent); color: var(--accent-ink); }
    .choice.secondary .icon { background: var(--blue); color: #082f49; }
    @media (max-width: 620px) { .choices { grid-template-columns: 1fr; } .choice { min-height: 172px; border-radius: 24px; } }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Bingo em Casa</h1>
      <p class="subtitle">Escolha como vai brincar</p>
    </header>
    <section class="choices" aria-label="Opções do bingo">
      <a class="choice primary" href="sorteador.html" aria-label="Abrir sorteador de bingo">
        <div class="icon">🎙️</div>
        <div><strong>Sorteador</strong><span>Para chamar os números, com narração opcional.</span></div>
      </a>
      <a class="choice secondary" href="cartela.html" aria-label="Abrir cartela de bingo">
        <div class="icon">▦</div>
        <div><strong>Cartela</strong><span>Para marcar os números no celular.</span></div>
      </a>
    </section>
  </main>
</body>
</html>
