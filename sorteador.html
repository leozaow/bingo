<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <title>Sorteador de Bingo</title>
  <style>
    :root {
      --bg: #07111f;
      --bg-2: #0f1b2f;
      --panel: rgba(255, 255, 255, .09);
      --panel-2: rgba(255, 255, 255, .14);
      --line: rgba(255, 255, 255, .14);
      --text: #f8fafc;
      --muted: #b7c4d8;
      --cell: #f8fafc;
      --cell-ink: #07111f;
      --accent: #22c55e;
      --accent-ink: #052e16;
      --gold: #facc15;
      --danger: #ef4444;
      --danger-soft: rgba(239, 68, 68, .18);
      --blue: #38bdf8;
      --shadow: 0 20px 50px rgba(0, 0, 0, .32);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% -10%, #203b66 0, rgba(32, 59, 102, .42) 32%, transparent 63%),
        linear-gradient(180deg, var(--bg-2), var(--bg));
      padding: max(12px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      overflow-x: hidden;
    }

    main {
      width: min(100%, 1180px);
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .topbar {
      min-height: 42px;
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
    }

    .home {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      text-decoration: none;
      background: rgba(255, 255, 255, .08);
      font-size: .82rem;
      font-weight: 900;
      padding: 0 10px;
      opacity: .86;
    }


    .top-actions {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      justify-self: end;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(1.7rem, 7.5vw, 3.8rem);
      line-height: .96;
      letter-spacing: -.06em;
      font-weight: 950;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(330px, 430px) minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border-radius: 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .stage {
      padding: clamp(14px, 3vw, 22px);
      display: grid;
      gap: 13px;
    }

    .ball-wrap {
      min-height: clamp(230px, 35vw, 340px);
      display: grid;
      place-items: center;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.12), transparent 55%),
        rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      overflow: hidden;
      position: relative;
    }

    .ball-wrap::before,
    .ball-wrap::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      pointer-events: none;
    }

    .ball-wrap::before { inset: 16px; }
    .ball-wrap::after { inset: 34px; opacity: .55; }

    .ball {
      width: min(72vw, 238px);
      height: min(72vw, 238px);
      max-width: 238px;
      max-height: 238px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 35% 26%, #ffffff 0 8%, #e8fff0 9% 18%, transparent 19%),
        radial-gradient(circle at 45% 35%, #ffffff, #dff8e9 44%, var(--accent) 72%, #16a34a 100%);
      color: var(--accent-ink);
      font-size: clamp(5rem, 23vw, 8.4rem);
      font-weight: 1000;
      line-height: 1;
      letter-spacing: -.08em;
      box-shadow:
        inset -18px -26px 34px rgba(5, 46, 22, .28),
        inset 13px 18px 30px rgba(255,255,255,.7),
        0 28px 60px rgba(0,0,0,.34);
      position: relative;
      z-index: 1;
      transform-origin: center;
    }

    .ball.empty {
      background: linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.08));
      color: rgba(248,250,252,.78);
      letter-spacing: 0;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.08), 0 28px 60px rgba(0,0,0,.22);
    }

    .ball.rolling {
      animation: roll .46s linear infinite;
      filter: saturate(1.15) brightness(1.04);
    }

    .ball.revealed {
      animation: pop .44s cubic-bezier(.2,1.4,.25,1);
    }

    .ball.done {
      background: radial-gradient(circle at 40% 35%, #ffffff, #fef3c7 42%, var(--gold) 75%, #eab308 100%);
      color: #422006;
    }

    @keyframes roll {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(8deg) scale(1.035); }
      100% { transform: rotate(-8deg) scale(1); }
    }

    @keyframes pop {
      0% { transform: scale(.72); opacity: .5; }
      70% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); }
    }

    .mini-status {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .chip {
      min-height: 54px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .075);
      border-radius: 16px;
      padding: 8px 7px;
      display: grid;
      align-content: center;
      justify-items: center;
    }

    .chip span {
      color: var(--muted);
      font-size: clamp(.62rem, 2.5vw, .75rem);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 850;
      line-height: 1;
    }

    .chip strong {
      margin-top: 5px;
      font-size: clamp(1rem, 4vw, 1.22rem);
      line-height: 1;
      font-weight: 950;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      gap: 8px;
    }

    button {
      min-height: 56px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 0 12px;
      font: 900 clamp(.88rem, 3.2vw, 1rem) / 1 ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      background: rgba(255, 255, 255, .10);
      cursor: pointer;
      transition: transform .08s ease, filter .16s ease, border-color .16s ease, background .16s ease;
    }

    button:active { transform: scale(.985); }
    button:hover { filter: brightness(1.06); border-color: rgba(255,255,255,.30); }
    button:disabled { opacity: .52; cursor: not-allowed; transform: none; }

    .orientation-toggle,
    .voice-toggle {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 10px;
      color: var(--muted);
      background: rgba(255, 255, 255, .09);
      font: 900 clamp(.66rem, 2.8vw, .8rem) / 1 ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .14);
      backdrop-filter: blur(16px);
      opacity: .72;
      transition: opacity .16s ease, transform .08s ease, background .16s ease, color .16s ease;
      justify-self: end;
    }

    .voice-toggle {
      width: 32px;
      padding: 0;
      font-size: 1rem;
      line-height: 1;
    }

    .voice-toggle.active {
      color: #bbf7d0;
      border-color: rgba(34, 197, 94, .45);
      background: rgba(34, 197, 94, .18);
      opacity: 1;
    }

    .orientation-toggle.active,
    .orientation-toggle:hover,
    .voice-toggle:hover {
      opacity: 1;
      color: var(--text);
      background: rgba(255, 255, 255, .16);
    }

    .orientation-toggle:active,
    .voice-toggle:active { transform: scale(.98); }

    .primary { background: var(--accent); color: var(--accent-ink); }
    .auto-on { background: var(--blue); color: #082f49; }
    .danger { background: var(--danger-soft); color: #fecaca; }

    .recent-panel {
      display: none;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255, 255, 255, .055);
      border-radius: 16px;
      padding: 8px;
      gap: 7px;
      min-height: 0;
    }

    .recent-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      font-weight: 950;
      line-height: 1;
    }

    .recent-head strong {
      color: var(--text);
      font-size: .78rem;
      letter-spacing: 0;
      text-transform: none;
    }

    .recent-stats {
      display: none;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
      min-width: 0;
    }

    .recent-stat {
      min-height: 24px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.075);
      padding: 3px 7px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      line-height: 1;
    }

    .recent-stat span {
      color: var(--muted);
      font-size: .54rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 900;
    }

    .recent-stat strong {
      color: var(--text);
      font-size: .72rem;
      font-weight: 1000;
      letter-spacing: -.02em;
    }

    .compact-sequence {
      min-height: 0;
      padding: 0;
      border: 0;
      background: transparent;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
      overflow: hidden;
      scrollbar-width: none;
    }

    .compact-sequence::-webkit-scrollbar { display: none; }

    .history {
      padding: clamp(12px, 2.6vw, 18px);
      display: grid;
      gap: 12px;
    }

    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 10px;
    }

    .history-title {
      font-size: clamp(1.05rem, 3.8vw, 1.35rem);
      font-weight: 950;
      letter-spacing: -.035em;
      margin: 0;
    }

    .sequence {
      min-height: 54px;
      border-radius: 17px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255, 255, 255, .06);
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .seq-num {
      flex: 0 0 auto;
      min-width: 38px;
      height: 38px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--cell);
      color: var(--cell-ink);
      font-weight: 1000;
      box-shadow: inset 0 -3px 0 rgba(7, 17, 31, .12);
    }

    .seq-num.latest {
      background: var(--gold);
      color: #422006;
      animation: pulse .65s ease;
    }

    @keyframes pulse {
      0% { transform: scale(.76); }
      70% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .empty-sequence {
      color: var(--muted);
      font-weight: 800;
      padding-left: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: clamp(5px, 1.1vw, 8px);
    }

    .number {
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, .10);
      border: 1px solid rgba(255,255,255,.10);
      color: rgba(248, 250, 252, .72);
      font-weight: 950;
      font-size: clamp(.78rem, 2.2vw, 1.08rem);
      position: relative;
      overflow: hidden;
    }

    .number.called {
      background: var(--accent);
      color: var(--accent-ink);
      border-color: rgba(187,247,208,.75);
      box-shadow: inset 0 -3px 0 rgba(5, 46, 22, .16);
    }

    .number.latest {
      background: var(--gold);
      color: #422006;
      animation: latestGlow 1.1s ease both;
    }

    @keyframes latestGlow {
      0% { transform: scale(.8); box-shadow: 0 0 0 rgba(250, 204, 21, 0); }
      55% { transform: scale(1.08); box-shadow: 0 0 28px rgba(250, 204, 21, .52); }
      100% { transform: scale(1); box-shadow: inset 0 -3px 0 rgba(66, 32, 6, .16); }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      background: rgba(7, 17, 31, .94);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 11px 15px;
      font-weight: 900;
      box-shadow: 0 14px 34px rgba(0, 0, 0, .28);
      transition: opacity .18s ease, transform .18s ease;
      z-index: 20;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .finish {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      z-index: 12;
      background: rgba(7, 17, 31, .28);
      transition: opacity .2s ease;
    }

    .finish.show { opacity: 1; }

    .finish-word {
      padding: 20px 28px;
      border-radius: 28px;
      color: #422006;
      background: linear-gradient(180deg, #fde68a, #facc15);
      box-shadow: 0 28px 80px rgba(0,0,0,.36);
      font-size: clamp(2.8rem, 12vw, 7rem);
      line-height: .9;
      font-weight: 1000;
      letter-spacing: -.08em;
      transform: rotate(-2deg) scale(.82);
    }

    .finish.show .finish-word { animation: finishPop .6s cubic-bezier(.2,1.4,.25,1) both; }

    @keyframes finishPop {
      0% { transform: rotate(-8deg) scale(.62); opacity: 0; }
      70% { transform: rotate(2deg) scale(1.05); opacity: 1; }
      100% { transform: rotate(-2deg) scale(1); }
    }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .ball-wrap { min-height: clamp(220px, 62vw, 340px); }
    }

    @media (max-width: 560px) {
      body { padding-inline: 8px; }
      .topbar { grid-template-columns: 62px minmax(0, 1fr) auto; }
      .home { font-size: .72rem; padding-inline: 8px; }
      .top-actions { gap: 5px; }
      .voice-toggle { width: 30px; }
      .stage, .history { border-radius: 22px; }
      .controls { grid-template-columns: 1fr; }
      .controls button { min-height: 52px; }
      .mini-status { gap: 6px; }
      .chip { min-height: 50px; border-radius: 14px; }
      .grid { grid-template-columns: repeat(9, minmax(0, 1fr)); gap: 5px; }
      .number { border-radius: 10px; font-size: clamp(.7rem, 3.35vw, .96rem); }
    }

    @media (orientation: landscape) and (max-height: 620px) {
      html:not(.force-portrait) body {
        height: 100dvh;
        min-height: 100dvh;
        padding: 8px;
        overflow: hidden;
      }

      html:not(.force-portrait) main {
        gap: 8px;
        height: calc(100dvh - 16px);
        grid-template-rows: auto minmax(0, 1fr);
      }

      html:not(.force-portrait) .topbar {
        min-height: 30px;
        grid-template-columns: 66px minmax(0, 1fr) auto;
      }

      html:not(.force-portrait) .home,
      html:not(.force-portrait) .orientation-toggle,
      html:not(.force-portrait) .voice-toggle {
        min-height: 28px;
        padding-inline: 8px;
        font-size: .66rem;
      }

      html:not(.force-portrait) .voice-toggle {
        width: 28px;
        padding-inline: 0;
        font-size: .82rem;
      }

      html:not(.force-portrait) h1 {
        font-size: clamp(1.05rem, 4vw, 1.7rem);
      }

      html:not(.force-portrait) .layout {
        grid-template-columns: minmax(250px, 35vw) minmax(0, 1fr);
        gap: 8px;
        height: 100%;
        min-height: 0;
        align-items: stretch;
      }

      html:not(.force-portrait) .stage,
      html:not(.force-portrait) .history {
        padding: 8px;
        border-radius: 18px;
        gap: 8px;
        min-height: 0;
        height: 100%;
      }

      html:not(.force-portrait) .stage {
        grid-template-rows: minmax(0, 1fr) auto auto;
      }

      html:not(.force-portrait) .ball-wrap {
        min-height: 0;
        height: auto;
        border-radius: 16px;
      }

      html:not(.force-portrait) .ball-wrap::before { inset: 12px; }
      html:not(.force-portrait) .ball-wrap::after { inset: 25px; }

      html:not(.force-portrait) .ball {
        width: min(27vw, 43vh);
        height: min(27vw, 43vh);
        font-size: clamp(3.1rem, 19vh, 5.7rem);
      }

      html:not(.force-portrait) .mini-status {
        display: none;
      }

      html:not(.force-portrait) .recent-stats {
        display: none;
      }

      html:not(.force-portrait) .controls {
        grid-template-columns: 1.25fr 1fr 1fr;
        gap: 5px;
      }

      html:not(.force-portrait) .controls button {
        min-height: 40px;
        border-radius: 12px;
        font-size: .72rem;
        padding-inline: 6px;
      }

      html:not(.force-portrait) .recent-panel {
        display: flex;
        align-items: center;
        gap: 7px;
        min-height: 38px;
        padding: 5px 7px;
        border-radius: 14px;
      }

      html:not(.force-portrait) .recent-head {
        flex: 0 0 auto;
        text-transform: none;
        letter-spacing: 0;
        font-size: .72rem;
        white-space: nowrap;
      }

      html:not(.force-portrait) .recent-head strong {
        display: none;
      }

      html:not(.force-portrait) .compact-sequence {
        flex: 1 1 auto;
        width: auto;
        height: 29px;
        align-items: center;
        justify-content: flex-end;
      }

      html:not(.force-portrait) .compact-sequence .seq-num {
        min-width: 26px;
        height: 26px;
        font-size: .72rem;
        box-shadow: inset 0 -2px 0 rgba(7, 17, 31, .12);
      }

      html:not(.force-portrait) .compact-sequence .empty-sequence {
        font-size: .72rem;
        padding-left: 0;
        margin-left: auto;
      }

      html:not(.force-portrait) .history {
        grid-template-rows: auto minmax(0, 1fr);
        overflow: hidden;
      }

      html:not(.force-portrait) .history-title {
        font-size: clamp(.92rem, 3.3vw, 1.25rem);
      }

      html:not(.force-portrait) .history-head {
        align-items: center;
      }

      html:not(.force-portrait) #lastInfo {
        font-size: .9rem;
        color: var(--muted);
        white-space: nowrap;
      }

      html:not(.force-portrait) .history > .sequence {
        display: none;
      }

      html:not(.force-portrait) .grid {
        height: 100%;
        min-height: 0;
        grid-template-columns: repeat(10, minmax(0, 1fr));
        grid-template-rows: repeat(9, minmax(0, 1fr));
        gap: 4px;
      }

      html:not(.force-portrait) .number {
        aspect-ratio: auto;
        min-height: 0;
        border-radius: 8px;
        font-size: clamp(.56rem, 2.5vh, .86rem);
        box-shadow: inset 0 -2px 0 rgba(5, 46, 22, .10);
      }
    }

    @media (orientation: landscape) and (max-height: 430px) {
      html:not(.force-portrait) .layout {
        grid-template-columns: minmax(238px, 33vw) minmax(0, 1fr);
      }

      html:not(.force-portrait) .ball {
        width: min(24vw, 38vh);
        height: min(24vw, 38vh);
        font-size: clamp(2.8rem, 17vh, 4.8rem);
      }

      html:not(.force-portrait) .recent-panel {
        padding: 4px 6px;
        gap: 6px;
        border-radius: 12px;
        min-height: 32px;
      }

      html:not(.force-portrait) .compact-sequence {
        height: 24px;
        gap: 4px;
      }

      html:not(.force-portrait) .compact-sequence .seq-num {
        min-width: 22px;
        height: 22px;
        font-size: .64rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <a class="home" href="index.html">Início</a>
      <h1>Sorteador de Bingo</h1>
      <div class="top-actions" aria-label="Ações rápidas">
        <button class="voice-toggle" id="voiceToggle" type="button" aria-label="Ativar narração" aria-pressed="false" title="Ativar narração">🔇</button>
        <button class="orientation-toggle" id="orientationToggle" type="button" aria-label="Alternar modo de tela">↔ Paisagem</button>
      </div>
    </div>

    <section class="layout" aria-label="Sorteador de bingo 90 bolas">
      <section class="panel stage">
        <div class="ball-wrap" aria-live="polite">
          <div class="ball empty" id="ball">–</div>
        </div>

        <section class="mini-status" aria-label="Resumo do sorteio">
          <div class="chip"><span>Sorteados</span><strong id="drawnCount">0/90</strong></div>
          <div class="chip"><span>Restam</span><strong id="remainingCount">90</strong></div>
          <div class="chip"><span>Auto</span><strong id="autoState">Não</strong></div>
        </section>

        <section class="controls" aria-label="Controles do sorteador">
          <button class="primary" id="drawButton" type="button">Sortear</button>
          <button id="autoButton" type="button">Auto 7s</button>
          <button class="danger" id="resetButton" type="button">Reiniciar</button>
        </section>

        <section class="recent-panel" aria-label="Últimos números sorteados">
          <div class="recent-head">
            <span>Últimos</span>
            <div class="recent-stats" aria-label="Resumo compacto do sorteio">
              <div class="recent-stat"><span>Sorteados</span><strong id="compactDrawnCount">0/90</strong></div>
              <div class="recent-stat"><span>Restam</span><strong id="compactRemainingCount">90</strong></div>
              <div class="recent-stat"><span>Auto</span><strong id="compactAutoState">Não</strong></div>
            </div>
            <strong id="compactLastInfo">–</strong>
          </div>
          <div class="sequence compact-sequence" id="compactSequence" aria-label="Últimos números sorteados"></div>
        </section>
      </section>

      <section class="panel history">
        <div class="history-head">
          <h2 class="history-title">Histórico</h2>
          <span id="lastInfo" aria-live="polite"></span>
        </div>
        <div class="sequence" id="sequence" aria-label="Sequência de números sorteados"></div>
        <div class="grid" id="grid" aria-label="Números de 1 a 90"></div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="finish" id="finish" aria-hidden="true"><div class="finish-word">FIM!</div></div>

  <script>
    const STORAGE_KEY = 'sorteador-bingo-90:v1';
    // Narração: pacote curto de frases especiais + reta final somente para números sem frase especial.
    const TOTAL = 90;
    const AUTO_SECONDS = 7;
    const VOICE_STORAGE_KEY = 'sorteador-bingo-90:narracao';

    const ballEl = document.getElementById('ball');
    const gridEl = document.getElementById('grid');
    const sequenceEl = document.getElementById('sequence');
    const compactSequenceEl = document.getElementById('compactSequence');
    const compactLastInfoEl = document.getElementById('compactLastInfo');
    const drawnCountEl = document.getElementById('drawnCount');
    const remainingCountEl = document.getElementById('remainingCount');
    const autoStateEl = document.getElementById('autoState');
    const compactDrawnCountEl = document.getElementById('compactDrawnCount');
    const compactRemainingCountEl = document.getElementById('compactRemainingCount');
    const compactAutoStateEl = document.getElementById('compactAutoState');
    const lastInfoEl = document.getElementById('lastInfo');
    const drawButtonEl = document.getElementById('drawButton');
    const autoButtonEl = document.getElementById('autoButton');
    const resetButtonEl = document.getElementById('resetButton');
    const toastEl = document.getElementById('toast');
    const finishEl = document.getElementById('finish');
    const orientationToggleEl = document.getElementById('orientationToggle');
    const voiceToggleEl = document.getElementById('voiceToggle');
    const LAYOUT_STORAGE_KEY = 'sorteador-bingo-90:layout';

    let layoutPreference = localStorage.getItem(LAYOUT_STORAGE_KEY) || 'auto';
    let state = readState() || createState();
    let isRolling = false;
    let autoEnabled = false;
    let autoTimer = null;
    let countdownTimer = null;
    let nextAutoAt = null;
    let narrationEnabled = localStorage.getItem(VOICE_STORAGE_KEY) !== 'off';
    let preferredVoice = null;

    normalizeState();
    render();
    applyLayoutPreference();
    initNarration();
    renderVoiceState();

    window.addEventListener('resize', applyLayoutPreference);
    window.addEventListener('orientationchange', () => setTimeout(applyLayoutPreference, 160));
    orientationToggleEl.addEventListener('click', toggleOrientationPreference);
    voiceToggleEl.addEventListener('click', toggleNarration);

    drawButtonEl.addEventListener('click', () => drawNumber());
    autoButtonEl.addEventListener('click', toggleAuto);
    resetButtonEl.addEventListener('click', confirmResetGame);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) stopAuto(false);
    });

    function isCompactLandscape() {
      return window.innerWidth > window.innerHeight && window.innerHeight <= 620 && window.innerWidth <= 1180;
    }

    function applyLayoutPreference() {
      const useLandscape = layoutPreference !== 'portrait' && isCompactLandscape();
      document.documentElement.classList.toggle('is-landscape-layout', useLandscape);
      document.documentElement.classList.toggle('force-portrait', layoutPreference === 'portrait');

      if (layoutPreference === 'portrait') {
        orientationToggleEl.textContent = '↔ Paisagem';
        orientationToggleEl.classList.remove('active');
      } else if (useLandscape) {
        orientationToggleEl.textContent = '↕ Retrato';
        orientationToggleEl.classList.add('active');
      } else {
        orientationToggleEl.textContent = '↔ Paisagem';
        orientationToggleEl.classList.toggle('active', layoutPreference === 'landscape');
      }

      requestAnimationFrame(renderSequence);
    }

    async function toggleOrientationPreference() {
      const usingLandscape = document.documentElement.classList.contains('is-landscape-layout');

      if (usingLandscape || layoutPreference === 'landscape') {
        layoutPreference = 'portrait';
        localStorage.setItem(LAYOUT_STORAGE_KEY, layoutPreference);
        await tryLockOrientation('portrait-primary');
        if (document.fullscreenElement && document.exitFullscreen) {
          try { await document.exitFullscreen(); } catch {}
        }
        applyLayoutPreference();
        showToast('Modo retrato');
        return;
      }

      layoutPreference = 'landscape';
      localStorage.setItem(LAYOUT_STORAGE_KEY, layoutPreference);
      const locked = await tryLockOrientation('landscape');
      applyLayoutPreference();

      setTimeout(() => {
        applyLayoutPreference();
        if (document.documentElement.classList.contains('is-landscape-layout')) {
          showToast('Modo paisagem');
        } else {
          showToast(locked ? 'Modo paisagem ativado' : 'Gire o celular para paisagem');
        }
      }, 360);
    }

    async function tryLockOrientation(orientation) {
      if (!screen.orientation || !screen.orientation.lock) return false;

      try {
        const shouldUseFullscreen = matchMedia('(pointer: coarse)').matches && document.documentElement.requestFullscreen;
        if (shouldUseFullscreen && !document.fullscreenElement) {
          try { await document.documentElement.requestFullscreen({ navigationUI: 'hide' }); } catch {}
        }
        await screen.orientation.lock(orientation);
        return true;
      } catch {
        return false;
      }
    }


    function initNarration() {
      loadPreferredVoice();
      if ('speechSynthesis' in window) {
        speechSynthesis.onvoiceschanged = () => loadPreferredVoice();
      }
    }

    function loadPreferredVoice() {
      if (!('speechSynthesis' in window)) return;
      const voices = speechSynthesis.getVoices();
      preferredVoice =
        voices.find(voice => voice.lang === 'pt-BR' && /google/i.test(voice.name)) ||
        voices.find(voice => voice.lang === 'pt-BR' && /brasil|brazil|maria|francisca|antonio/i.test(voice.name)) ||
        voices.find(voice => voice.lang === 'pt-BR') ||
        voices.find(voice => /^pt[-_]/i.test(voice.lang)) ||
        null;
    }

    function toggleNarration() {
      if (!('speechSynthesis' in window)) {
        narrationEnabled = false;
        localStorage.setItem(VOICE_STORAGE_KEY, 'off');
        renderVoiceState();
        showToast('Narração indisponível neste navegador');
        return;
      }

      narrationEnabled = !narrationEnabled;
      localStorage.setItem(VOICE_STORAGE_KEY, narrationEnabled ? 'on' : 'off');
      if (!narrationEnabled) speechSynthesis.cancel();
      loadPreferredVoice();
      renderVoiceState();
      showToast(narrationEnabled ? 'Narração ligada' : 'Narração desligada');
    }

    function renderVoiceState() {
      voiceToggleEl.classList.toggle('active', narrationEnabled);
      voiceToggleEl.textContent = narrationEnabled ? '🔊' : '🔇';
      voiceToggleEl.setAttribute('aria-pressed', narrationEnabled ? 'true' : 'false');
      voiceToggleEl.setAttribute('aria-label', narrationEnabled ? 'Desativar narração' : 'Ativar narração');
      voiceToggleEl.title = narrationEnabled ? 'Desativar narração' : 'Ativar narração';
    }

    function announceNumber(number) {
      if (!narrationEnabled || !('speechSynthesis' in window)) return;
      loadPreferredVoice();
      const text = buildNarration(number, state.sequence.length);
      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'pt-BR';
      utterance.rate = 1.03;
      utterance.pitch = 1.06;
      utterance.volume = 1;
      if (preferredVoice) utterance.voice = preferredVoice;
      speechSynthesis.speak(utterance);
    }

    const SPECIAL_PHRASES = {
      1: ['Ronco do porco!'],
      3: ['Trincou!'],
      4: ['Pé de mesa!'],
      5: ['Aperta o cinto!'],
      6: ['Tá com pingo na barriga!'],
      7: ['Deu sorte!'],
      8: ['Hora de molhar o biscoito!'],
      9: ['Tá com pingo no pé!'],
      10: ['Atacante!'],
      11: ['Um atrás do outro!'],
      13: ['Deu azar ou faz o L!'],
      15: ['Debutante!'],
      17: ['Faz a arminha, mas só no meme!'],
      18: ['Tá de maior!'],
      22: ['Dois patinhos na lagoa!'],
      23: ['Meio alegre!'],
      24: ['Alegria, alegria!'],
      26: ['Confere outra vez!'],
      31: ['Preparem os fogos!'],
      33: ['Idade de Cristo!'],
      38: ['Na cintura, estilo de cinema!'],
      40: ['Primeiro dos entas!'],
      42: ['A resposta pra tudo!'],
      45: ['Acabou o primeiro tempo!'],
      51: ['Uma boa ideia!'],
      53: ['Marca sem timidez!'],
      55: ['Dois cachorros do padre!', 'Dois portugueses numa perna só!'],
      63: ['Confere outra vez!'],
      64: ['Melhor Nintendo!'],
      66: ['Meia meia, só falta o sapato!', 'Meia meia, tapa atrás da orelha!', 'Duas velinhas!'],
      69: ['Um indo, outro voltando!', 'Um pra cima e outro pra baixo!'],
      75: ['No antigo acabava, aqui ainda tem jogo!'],
      77: ['Sorte em dobro!'],
      78: ['Tá na hora de molhar o biscoito!'],
      88: ['Dois óculos na mesa!']
    };

    const LATE_GAME_PHRASES = [
      'O bingo tá quase saindo!',
      'Tem cheiro de bingo no ar!',
      'Se piscar, alguém grita bingo!',
      'Agora é coração na mão!',
      'A cartela já tá pedindo conferência!'
    ];

    function buildNarration(number, drawnCount) {
      const word = numberToPortuguese(number);
      const specialList = SPECIAL_PHRASES[number] || [];
      const special = specialList.length ? pick(specialList) : '';
      const specialFirst = special && Math.random() < 0.28;

      if (specialFirst) {
        return `${special} Saiu ${word}. Repito: ${word}.`;
      }

      if (special) {
        return `${word}. Repito: ${word}. ${special}`;
      }

      const late = lateGameHype(drawnCount);
      if (late) {
        return pick([
          `${word}. Repito: ${word}. ${late}`,
          `Saiu ${word}. Eu repito: ${word}. ${late}`,
          `Atenção: ${word}. ${word}. ${late}`
        ]);
      }

      return pick([
        `${word}. Repito: ${word}.`,
        `Saiu ${word}. Eu repito: ${word}.`,
        `Atenção: ${word}. ${word}.`
      ]);
    }

    function lateGameHype(drawnCount) {
      if (drawnCount < 70) return '';
      return pick(LATE_GAME_PHRASES);
    }

    function pick(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function numberToPortuguese(number) {
      const units = ['', 'um', 'dois', 'três', 'quatro', 'cinco', 'seis', 'sete', 'oito', 'nove'];
      const teens = {
        10: 'dez', 11: 'onze', 12: 'doze', 13: 'treze', 14: 'quatorze',
        15: 'quinze', 16: 'dezesseis', 17: 'dezessete', 18: 'dezoito', 19: 'dezenove'
      };
      const tens = {
        20: 'vinte', 30: 'trinta', 40: 'quarenta', 50: 'cinquenta',
        60: 'sessenta', 70: 'setenta', 80: 'oitenta', 90: 'noventa'
      };

      if (number < 10) return units[number];
      if (number < 20) return teens[number];
      const ten = Math.floor(number / 10) * 10;
      const unit = number % 10;
      return unit === 0 ? tens[ten] : `${tens[ten]} e ${units[unit]}`;
    }


    function createState() {
      return {
        sequence: [],
        current: null,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
    }

    function normalizeState() {
      const clean = [];
      const seen = new Set();
      for (const value of Array.isArray(state.sequence) ? state.sequence : []) {
        const num = Number(value);
        if (Number.isInteger(num) && num >= 1 && num <= TOTAL && !seen.has(num)) {
          seen.add(num);
          clean.push(num);
        }
      }
      state.sequence = clean;
      state.current = clean.length ? clean[clean.length - 1] : null;
      state.updatedAt = state.updatedAt || new Date().toISOString();
      saveState();
    }

    function readState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function availableNumbers() {
      const used = new Set(state.sequence);
      const list = [];
      for (let i = 1; i <= TOTAL; i++) {
        if (!used.has(i)) list.push(i);
      }
      return list;
    }

    function drawNumber() {
      if (isRolling) return;

      const available = availableNumbers();
      if (!available.length) {
        stopAuto(false);
        showFinish();
        showToast('Todos os números já saíram');
        render();
        return;
      }

      isRolling = true;
      setButtonsState();

      const selected = available[Math.floor(Math.random() * available.length)];
      const startedAt = Date.now();
      const duration = 900;

      ballEl.classList.remove('empty', 'revealed', 'done');
      ballEl.classList.add('rolling');

      const spin = setInterval(() => {
        const pool = availableNumbers();
        const list = pool.length ? pool : available;
        ballEl.textContent = list[Math.floor(Math.random() * list.length)];
        if (Date.now() - startedAt >= duration) {
          clearInterval(spin);
          revealNumber(selected);
        }
      }, 58);
    }

    function revealNumber(number) {
      state.sequence.push(number);
      state.current = number;
      state.updatedAt = new Date().toISOString();
      saveState();

      ballEl.textContent = number;
      ballEl.classList.remove('rolling', 'empty');
      ballEl.classList.add('revealed');
      if (state.sequence.length === TOTAL) ballEl.classList.add('done');

      isRolling = false;
      render();
      setButtonsState();
      announceNumber(number);

      if (state.sequence.length === TOTAL) {
        stopAuto(false);
        showFinish();
      } else if (autoEnabled) {
        scheduleNextAuto();
      }
    }

    function toggleAuto() {
      if (autoEnabled) {
        stopAuto(true);
        return;
      }

      if (state.sequence.length >= TOTAL) {
        showToast('Reinicie para sortear de novo');
        return;
      }

      autoEnabled = true;
      renderAutoState();
      drawNumber();
      showToast('Automático ligado');
    }

    function scheduleNextAuto() {
      clearTimeout(autoTimer);
      clearInterval(countdownTimer);
      nextAutoAt = Date.now() + AUTO_SECONDS * 1000;
      countdownTimer = setInterval(renderAutoState, 250);
      autoTimer = setTimeout(() => {
        clearInterval(countdownTimer);
        countdownTimer = null;
        if (autoEnabled && !isRolling) drawNumber();
      }, AUTO_SECONDS * 1000);
      renderAutoState();
    }

    function stopAuto(showMessage) {
      autoEnabled = false;
      nextAutoAt = null;
      clearTimeout(autoTimer);
      clearInterval(countdownTimer);
      autoTimer = null;
      countdownTimer = null;
      renderAutoState();
      setButtonsState();
      if (showMessage) showToast('Automático desligado');
    }

    function confirmResetGame() {
      if (isRolling) return;

      const drawn = state.sequence.length;
      const message = drawn
        ? `Reiniciar o bingo?\n\nIsso vai apagar os ${drawn} número(s) já sorteado(s) e começar do zero.`
        : 'Reiniciar o bingo?\n\nO sorteio será zerado.';

      if (!window.confirm(message)) return;
      resetGame();
    }

    function resetGame() {
      if ('speechSynthesis' in window) speechSynthesis.cancel();
      stopAuto(false);
      state = createState();
      saveState();
      ballEl.className = 'ball empty';
      ballEl.textContent = '–';
      finishEl.classList.remove('show');
      render();
      showToast('Bingo reiniciado');
    }

    function render() {
      renderBall();
      renderStats();
      renderSequence();
      renderGrid();
      renderAutoState();
      setButtonsState();
    }

    function renderBall() {
      if (isRolling) return;
      ballEl.textContent = state.current ?? '–';
      ballEl.classList.toggle('empty', !state.current);
      ballEl.classList.toggle('done', state.sequence.length === TOTAL && !!state.current);
    }

    function renderStats() {
      const drawn = state.sequence.length;
      drawnCountEl.textContent = `${drawn}/${TOTAL}`;
      remainingCountEl.textContent = `${TOTAL - drawn}`;
      compactDrawnCountEl.textContent = `${drawn}/${TOTAL}`;
      compactRemainingCountEl.textContent = `${TOTAL - drawn}`;
      lastInfoEl.textContent = state.current ? `Último: ${state.current}` : '';
    }

    function renderAutoState() {
      if (!autoEnabled) {
        autoStateEl.textContent = 'Não';
        compactAutoStateEl.textContent = 'Não';
        autoButtonEl.textContent = 'Auto 7s';
        autoButtonEl.classList.remove('auto-on');
        return;
      }

      autoButtonEl.classList.add('auto-on');
      if (isRolling || !nextAutoAt) {
        autoStateEl.textContent = 'Sim';
        compactAutoStateEl.textContent = 'Sim';
        autoButtonEl.textContent = 'Parar auto';
        return;
      }

      const seconds = Math.max(0, Math.ceil((nextAutoAt - Date.now()) / 1000));
      autoStateEl.textContent = `${seconds}s`;
      compactAutoStateEl.textContent = `${seconds}s`;
      autoButtonEl.textContent = 'Parar auto';
    }

    function renderSequence() {
      fillSequence(sequenceEl, state.sequence, 'Nenhum número sorteado ainda', true);
      fillCompactSequence();
      compactLastInfoEl.textContent = state.current ? `#${state.current}` : '–';
    }

    function fillCompactSequence() {
      const width = compactSequenceEl.clientWidth || 260;
      const estimatedItemWidth = document.documentElement.classList.contains('is-landscape-layout') ? 31 : 42;
      const maxVisible = Math.max(1, Math.min(12, Math.floor(width / estimatedItemWidth)));
      const recentNumbers = state.sequence.slice(-maxVisible);
      fillSequence(compactSequenceEl, recentNumbers, 'Nenhum número ainda', false);
    }

    function fillSequence(container, numbers, emptyText, shouldScroll) {
      container.innerHTML = '';

      if (!numbers.length) {
        const empty = document.createElement('span');
        empty.className = 'empty-sequence';
        empty.textContent = emptyText;
        container.appendChild(empty);
        return;
      }

      numbers.forEach((num, index) => {
        const item = document.createElement('span');
        const isLatest = num === state.current && index === numbers.length - 1;
        item.className = `seq-num${isLatest ? ' latest' : ''}`;
        item.textContent = num;
        container.appendChild(item);
      });

      if (shouldScroll) container.scrollLeft = container.scrollWidth;
    }

    function renderGrid() {
      const used = new Set(state.sequence);
      gridEl.innerHTML = '';
      for (let number = 1; number <= TOTAL; number++) {
        const cell = document.createElement('div');
        cell.className = 'number';
        if (used.has(number)) cell.classList.add('called');
        if (number === state.current) cell.classList.add('latest');
        cell.textContent = number;
        gridEl.appendChild(cell);
      }
    }

    function setButtonsState() {
      const finished = state.sequence.length >= TOTAL;
      drawButtonEl.disabled = isRolling || finished;
      autoButtonEl.disabled = isRolling && !autoEnabled;
      resetButtonEl.disabled = isRolling;
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toastEl.classList.remove('show'), 1750);
    }

    function showFinish() {
      finishEl.classList.remove('show');
      void finishEl.offsetWidth;
      finishEl.classList.add('show');
      clearTimeout(showFinish.timer);
      showFinish.timer = setTimeout(() => finishEl.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
