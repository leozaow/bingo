<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <title>Sorteador de Bingo</title>
  <style>
    :root {
      --bg: #07111f;
      --bg-2: #0f1b2f;
      --panel: rgba(255, 255, 255, .09);
      --panel-2: rgba(255, 255, 255, .14);
      --line: rgba(255, 255, 255, .14);
      --text: #f8fafc;
      --muted: #b7c4d8;
      --cell: #f8fafc;
      --cell-ink: #07111f;
      --accent: #22c55e;
      --accent-ink: #052e16;
      --gold: #facc15;
      --danger: #ef4444;
      --danger-soft: rgba(239, 68, 68, .18);
      --blue: #38bdf8;
      --shadow: 0 20px 50px rgba(0, 0, 0, .32);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% -10%, #203b66 0, rgba(32, 59, 102, .42) 32%, transparent 63%),
        linear-gradient(180deg, var(--bg-2), var(--bg));
      padding: max(12px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      overflow-x: hidden;
    }

    main {
      width: min(100%, 1180px);
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .topbar {
      min-height: 42px;
      display: grid;
      grid-template-columns: 78px 1fr 78px;
      align-items: center;
      gap: 8px;
    }

    .home {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      text-decoration: none;
      background: rgba(255, 255, 255, .08);
      font-size: .82rem;
      font-weight: 900;
      padding: 0 10px;
      opacity: .86;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(1.7rem, 7.5vw, 3.8rem);
      line-height: .96;
      letter-spacing: -.06em;
      font-weight: 950;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(330px, 430px) minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border-radius: 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .stage {
      padding: clamp(14px, 3vw, 22px);
      display: grid;
      gap: 13px;
    }

    .ball-wrap {
      min-height: clamp(230px, 35vw, 340px);
      display: grid;
      place-items: center;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.12), transparent 55%),
        rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      overflow: hidden;
      position: relative;
    }

    .ball-wrap::before,
    .ball-wrap::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      pointer-events: none;
    }

    .ball-wrap::before { inset: 16px; }
    .ball-wrap::after { inset: 34px; opacity: .55; }

    .ball {
      width: min(72vw, 238px);
      height: min(72vw, 238px);
      max-width: 238px;
      max-height: 238px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 35% 26%, #ffffff 0 8%, #e8fff0 9% 18%, transparent 19%),
        radial-gradient(circle at 45% 35%, #ffffff, #dff8e9 44%, var(--accent) 72%, #16a34a 100%);
      color: var(--accent-ink);
      font-size: clamp(5rem, 23vw, 8.4rem);
      font-weight: 1000;
      line-height: 1;
      letter-spacing: -.08em;
      box-shadow:
        inset -18px -26px 34px rgba(5, 46, 22, .28),
        inset 13px 18px 30px rgba(255,255,255,.7),
        0 28px 60px rgba(0,0,0,.34);
      position: relative;
      z-index: 1;
      transform-origin: center;
    }

    .ball.empty {
      background: linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.08));
      color: rgba(248,250,252,.78);
      letter-spacing: 0;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.08), 0 28px 60px rgba(0,0,0,.22);
    }

    .ball.rolling {
      animation: roll .46s linear infinite;
      filter: saturate(1.15) brightness(1.04);
    }

    .ball.revealed {
      animation: pop .44s cubic-bezier(.2,1.4,.25,1);
    }

    .ball.done {
      background: radial-gradient(circle at 40% 35%, #ffffff, #fef3c7 42%, var(--gold) 75%, #eab308 100%);
      color: #422006;
    }

    @keyframes roll {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(8deg) scale(1.035); }
      100% { transform: rotate(-8deg) scale(1); }
    }

    @keyframes pop {
      0% { transform: scale(.72); opacity: .5; }
      70% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); }
    }

    .mini-status {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .chip {
      min-height: 54px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .075);
      border-radius: 16px;
      padding: 8px 7px;
      display: grid;
      align-content: center;
      justify-items: center;
    }

    .chip span {
      color: var(--muted);
      font-size: clamp(.62rem, 2.5vw, .75rem);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 850;
      line-height: 1;
    }

    .chip strong {
      margin-top: 5px;
      font-size: clamp(1rem, 4vw, 1.22rem);
      line-height: 1;
      font-weight: 950;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      gap: 8px;
    }

    button {
      min-height: 56px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 0 12px;
      font: 900 clamp(.88rem, 3.2vw, 1rem) / 1 ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      background: rgba(255, 255, 255, .10);
      cursor: pointer;
      transition: transform .08s ease, filter .16s ease, border-color .16s ease, background .16s ease;
    }

    button:active { transform: scale(.985); }
    button:hover { filter: brightness(1.06); border-color: rgba(255,255,255,.30); }
    button:disabled { opacity: .52; cursor: not-allowed; transform: none; }

    .primary { background: var(--accent); color: var(--accent-ink); }
    .auto-on { background: var(--blue); color: #082f49; }
    .danger { background: var(--danger-soft); color: #fecaca; }

    .history {
      padding: clamp(12px, 2.6vw, 18px);
      display: grid;
      gap: 12px;
    }

    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 10px;
    }

    .history-title {
      font-size: clamp(1.05rem, 3.8vw, 1.35rem);
      font-weight: 950;
      letter-spacing: -.035em;
      margin: 0;
    }

    .sequence {
      min-height: 54px;
      border-radius: 17px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255, 255, 255, .06);
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .seq-num {
      flex: 0 0 auto;
      min-width: 38px;
      height: 38px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--cell);
      color: var(--cell-ink);
      font-weight: 1000;
      box-shadow: inset 0 -3px 0 rgba(7, 17, 31, .12);
    }

    .seq-num.latest {
      background: var(--gold);
      color: #422006;
      animation: pulse .65s ease;
    }

    @keyframes pulse {
      0% { transform: scale(.76); }
      70% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .empty-sequence {
      color: var(--muted);
      font-weight: 800;
      padding-left: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: clamp(5px, 1.1vw, 8px);
    }

    .number {
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, .10);
      border: 1px solid rgba(255,255,255,.10);
      color: rgba(248, 250, 252, .72);
      font-weight: 950;
      font-size: clamp(.78rem, 2.2vw, 1.08rem);
      position: relative;
      overflow: hidden;
    }

    .number.called {
      background: var(--accent);
      color: var(--accent-ink);
      border-color: rgba(187,247,208,.75);
      box-shadow: inset 0 -3px 0 rgba(5, 46, 22, .16);
    }

    .number.latest {
      background: var(--gold);
      color: #422006;
      animation: latestGlow 1.1s ease both;
    }

    @keyframes latestGlow {
      0% { transform: scale(.8); box-shadow: 0 0 0 rgba(250, 204, 21, 0); }
      55% { transform: scale(1.08); box-shadow: 0 0 28px rgba(250, 204, 21, .52); }
      100% { transform: scale(1); box-shadow: inset 0 -3px 0 rgba(66, 32, 6, .16); }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      background: rgba(7, 17, 31, .94);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 11px 15px;
      font-weight: 900;
      box-shadow: 0 14px 34px rgba(0, 0, 0, .28);
      transition: opacity .18s ease, transform .18s ease;
      z-index: 20;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .finish {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      z-index: 12;
      background: rgba(7, 17, 31, .28);
      transition: opacity .2s ease;
    }

    .finish.show { opacity: 1; }

    .finish-word {
      padding: 20px 28px;
      border-radius: 28px;
      color: #422006;
      background: linear-gradient(180deg, #fde68a, #facc15);
      box-shadow: 0 28px 80px rgba(0,0,0,.36);
      font-size: clamp(2.8rem, 12vw, 7rem);
      line-height: .9;
      font-weight: 1000;
      letter-spacing: -.08em;
      transform: rotate(-2deg) scale(.82);
    }

    .finish.show .finish-word { animation: finishPop .6s cubic-bezier(.2,1.4,.25,1) both; }

    @keyframes finishPop {
      0% { transform: rotate(-8deg) scale(.62); opacity: 0; }
      70% { transform: rotate(2deg) scale(1.05); opacity: 1; }
      100% { transform: rotate(-2deg) scale(1); }
    }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .ball-wrap { min-height: clamp(220px, 62vw, 340px); }
    }

    @media (max-width: 560px) {
      body { padding-inline: 8px; }
      .topbar { grid-template-columns: 62px 1fr 62px; }
      .home { font-size: .72rem; padding-inline: 8px; }
      .stage, .history { border-radius: 22px; }
      .controls { grid-template-columns: 1fr; }
      button { min-height: 52px; }
      .mini-status { gap: 6px; }
      .chip { min-height: 50px; border-radius: 14px; }
      .grid { grid-template-columns: repeat(9, minmax(0, 1fr)); gap: 5px; }
      .number { border-radius: 10px; font-size: clamp(.7rem, 3.35vw, .96rem); }
    }

    @media (orientation: landscape) and (max-height: 560px) {
      body { min-height: 100dvh; padding: 8px; }
      main { gap: 8px; }
      .topbar { min-height: 30px; grid-template-columns: 66px 1fr 66px; }
      h1 { font-size: clamp(1.05rem, 4vw, 1.7rem); }
      .layout { grid-template-columns: minmax(250px, 34vw) minmax(0, 1fr); gap: 8px; }
      .stage, .history { padding: 8px; border-radius: 18px; gap: 8px; }
      .ball-wrap { min-height: calc(100dvh - 170px); border-radius: 16px; }
      .ball { width: min(30vw, 48vh); height: min(30vw, 48vh); font-size: clamp(3rem, 20vh, 5.6rem); }
      .mini-status { gap: 5px; }
      .chip { min-height: 35px; border-radius: 11px; padding: 4px; }
      .chip span { font-size: .5rem; }
      .chip strong { font-size: .8rem; margin-top: 3px; }
      .controls { grid-template-columns: 1.25fr 1fr 1fr; gap: 5px; }
      button { min-height: 42px; border-radius: 12px; font-size: .72rem; padding-inline: 6px; }
      .sequence { min-height: 44px; padding: 7px; gap: 5px; }
      .seq-num { min-width: 30px; height: 30px; font-size: .82rem; }
      .grid { gap: 4px; }
      .number { border-radius: 8px; font-size: clamp(.66rem, 2.3vh, .9rem); }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <a class="home" href="index.html">Início</a>
      <h1>Sorteador de Bingo</h1>
      <span aria-hidden="true"></span>
    </div>

    <section class="layout" aria-label="Sorteador de bingo 90 bolas">
      <section class="panel stage">
        <div class="ball-wrap" aria-live="polite">
          <div class="ball empty" id="ball">–</div>
        </div>

        <section class="mini-status" aria-label="Resumo do sorteio">
          <div class="chip"><span>Sorteados</span><strong id="drawnCount">0/90</strong></div>
          <div class="chip"><span>Restam</span><strong id="remainingCount">90</strong></div>
          <div class="chip"><span>Auto</span><strong id="autoState">Não</strong></div>
        </section>

        <section class="controls" aria-label="Controles do sorteador">
          <button class="primary" id="drawButton" type="button">Sortear</button>
          <button id="autoButton" type="button">Auto 7s</button>
          <button class="danger" id="resetButton" type="button">Reiniciar</button>
        </section>
      </section>

      <section class="panel history">
        <div class="history-head">
          <h2 class="history-title">Histórico</h2>
          <span id="lastInfo" aria-live="polite"></span>
        </div>
        <div class="sequence" id="sequence" aria-label="Sequência de números sorteados"></div>
        <div class="grid" id="grid" aria-label="Números de 1 a 90"></div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="finish" id="finish" aria-hidden="true"><div class="finish-word">FIM!</div></div>

  <script>
    const STORAGE_KEY = 'sorteador-bingo-90:v1';
    const TOTAL = 90;
    const AUTO_SECONDS = 7;

    const ballEl = document.getElementById('ball');
    const gridEl = document.getElementById('grid');
    const sequenceEl = document.getElementById('sequence');
    const drawnCountEl = document.getElementById('drawnCount');
    const remainingCountEl = document.getElementById('remainingCount');
    const autoStateEl = document.getElementById('autoState');
    const lastInfoEl = document.getElementById('lastInfo');
    const drawButtonEl = document.getElementById('drawButton');
    const autoButtonEl = document.getElementById('autoButton');
    const resetButtonEl = document.getElementById('resetButton');
    const toastEl = document.getElementById('toast');
    const finishEl = document.getElementById('finish');

    let state = readState() || createState();
    let isRolling = false;
    let autoEnabled = false;
    let autoTimer = null;
    let countdownTimer = null;
    let nextAutoAt = null;

    normalizeState();
    render();

    drawButtonEl.addEventListener('click', () => drawNumber());
    autoButtonEl.addEventListener('click', toggleAuto);
    resetButtonEl.addEventListener('click', resetGame);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) stopAuto(false);
    });

    function createState() {
      return {
        sequence: [],
        current: null,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
    }

    function normalizeState() {
      const clean = [];
      const seen = new Set();
      for (const value of Array.isArray(state.sequence) ? state.sequence : []) {
        const num = Number(value);
        if (Number.isInteger(num) && num >= 1 && num <= TOTAL && !seen.has(num)) {
          seen.add(num);
          clean.push(num);
        }
      }
      state.sequence = clean;
      state.current = clean.length ? clean[clean.length - 1] : null;
      state.updatedAt = state.updatedAt || new Date().toISOString();
      saveState();
    }

    function readState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function availableNumbers() {
      const used = new Set(state.sequence);
      const list = [];
      for (let i = 1; i <= TOTAL; i++) {
        if (!used.has(i)) list.push(i);
      }
      return list;
    }

    function drawNumber() {
      if (isRolling) return;

      const available = availableNumbers();
      if (!available.length) {
        stopAuto(false);
        showFinish();
        showToast('Todos os números já saíram');
        render();
        return;
      }

      isRolling = true;
      setButtonsState();

      const selected = available[Math.floor(Math.random() * available.length)];
      const startedAt = Date.now();
      const duration = 900;

      ballEl.classList.remove('empty', 'revealed', 'done');
      ballEl.classList.add('rolling');

      const spin = setInterval(() => {
        const pool = availableNumbers();
        const list = pool.length ? pool : available;
        ballEl.textContent = list[Math.floor(Math.random() * list.length)];
        if (Date.now() - startedAt >= duration) {
          clearInterval(spin);
          revealNumber(selected);
        }
      }, 58);
    }

    function revealNumber(number) {
      state.sequence.push(number);
      state.current = number;
      state.updatedAt = new Date().toISOString();
      saveState();

      ballEl.textContent = number;
      ballEl.classList.remove('rolling', 'empty');
      ballEl.classList.add('revealed');
      if (state.sequence.length === TOTAL) ballEl.classList.add('done');

      isRolling = false;
      render();
      setButtonsState();

      if (state.sequence.length === TOTAL) {
        stopAuto(false);
        showFinish();
      } else if (autoEnabled) {
        scheduleNextAuto();
      }
    }

    function toggleAuto() {
      if (autoEnabled) {
        stopAuto(true);
        return;
      }

      if (state.sequence.length >= TOTAL) {
        showToast('Reinicie para sortear de novo');
        return;
      }

      autoEnabled = true;
      renderAutoState();
      drawNumber();
      showToast('Automático ligado');
    }

    function scheduleNextAuto() {
      clearTimeout(autoTimer);
      clearInterval(countdownTimer);
      nextAutoAt = Date.now() + AUTO_SECONDS * 1000;
      countdownTimer = setInterval(renderAutoState, 250);
      autoTimer = setTimeout(() => {
        clearInterval(countdownTimer);
        countdownTimer = null;
        if (autoEnabled && !isRolling) drawNumber();
      }, AUTO_SECONDS * 1000);
      renderAutoState();
    }

    function stopAuto(showMessage) {
      autoEnabled = false;
      nextAutoAt = null;
      clearTimeout(autoTimer);
      clearInterval(countdownTimer);
      autoTimer = null;
      countdownTimer = null;
      renderAutoState();
      setButtonsState();
      if (showMessage) showToast('Automático desligado');
    }

    function resetGame() {
      stopAuto(false);
      state = createState();
      saveState();
      ballEl.className = 'ball empty';
      ballEl.textContent = '–';
      finishEl.classList.remove('show');
      render();
      showToast('Bingo reiniciado');
    }

    function render() {
      renderBall();
      renderStats();
      renderSequence();
      renderGrid();
      renderAutoState();
      setButtonsState();
    }

    function renderBall() {
      if (isRolling) return;
      ballEl.textContent = state.current ?? '–';
      ballEl.classList.toggle('empty', !state.current);
      ballEl.classList.toggle('done', state.sequence.length === TOTAL && !!state.current);
    }

    function renderStats() {
      const drawn = state.sequence.length;
      drawnCountEl.textContent = `${drawn}/${TOTAL}`;
      remainingCountEl.textContent = `${TOTAL - drawn}`;
      lastInfoEl.textContent = state.current ? `Último: ${state.current}` : '';
    }

    function renderAutoState() {
      if (!autoEnabled) {
        autoStateEl.textContent = 'Não';
        autoButtonEl.textContent = 'Auto 7s';
        autoButtonEl.classList.remove('auto-on');
        return;
      }

      autoButtonEl.classList.add('auto-on');
      if (isRolling || !nextAutoAt) {
        autoStateEl.textContent = 'Sim';
        autoButtonEl.textContent = 'Parar auto';
        return;
      }

      const seconds = Math.max(0, Math.ceil((nextAutoAt - Date.now()) / 1000));
      autoStateEl.textContent = `${seconds}s`;
      autoButtonEl.textContent = 'Parar auto';
    }

    function renderSequence() {
      sequenceEl.innerHTML = '';

      if (!state.sequence.length) {
        const empty = document.createElement('span');
        empty.className = 'empty-sequence';
        empty.textContent = 'Nenhum número sorteado ainda';
        sequenceEl.appendChild(empty);
        return;
      }

      state.sequence.forEach((num, index) => {
        const item = document.createElement('span');
        item.className = `seq-num${index === state.sequence.length - 1 ? ' latest' : ''}`;
        item.textContent = num;
        sequenceEl.appendChild(item);
      });
      sequenceEl.scrollLeft = sequenceEl.scrollWidth;
    }

    function renderGrid() {
      const used = new Set(state.sequence);
      gridEl.innerHTML = '';
      for (let number = 1; number <= TOTAL; number++) {
        const cell = document.createElement('div');
        cell.className = 'number';
        if (used.has(number)) cell.classList.add('called');
        if (number === state.current) cell.classList.add('latest');
        cell.textContent = number;
        gridEl.appendChild(cell);
      }
    }

    function setButtonsState() {
      const finished = state.sequence.length >= TOTAL;
      drawButtonEl.disabled = isRolling || finished;
      autoButtonEl.disabled = isRolling && !autoEnabled;
      resetButtonEl.disabled = isRolling;
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toastEl.classList.remove('show'), 1750);
    }

    function showFinish() {
      finishEl.classList.remove('show');
      void finishEl.offsetWidth;
      finishEl.classList.add('show');
      clearTimeout(showFinish.timer);
      showFinish.timer = setTimeout(() => finishEl.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
